name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Job 1: Build CLI (Go binary) ───
  build-cli:
    name: Build CLI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build CLI
        run: |
          go build -ldflags "-s -w" -o wincleanerlamp.exe .

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-amd64
          path: wincleanerlamp.exe

  # ─── Job 2: Build GUI + CLI (Electron app) ───
  build-gui:
    name: Build GUI + CLI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CLI binary
        run: |
          go build -ldflags "-s -w" -o gui/wincleanerlamp.exe .

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Build GUI (Vite + Electron TS)
        working-directory: gui
        run: npm run build

      - name: Package Electron app
        working-directory: gui
        run: npx electron-builder --win --x64 -c.extraFiles[0].from=wincleanerlamp.exe -c.extraFiles[0].to=wincleanerlamp.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-windows-amd64
          path: gui/dist-release/*.exe

  # ─── Job 3: Create GitHub Release ───
  release:
    name: Publish Release
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-windows-amd64
          path: artifacts/cli

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: gui-windows-amd64
          path: artifacts/gui

      - name: Rename CLI
        run: |
          TAG="${GITHUB_REF_NAME}"
          mv artifacts/cli/wincleanerlamp.exe "artifacts/wincleanerlamp-cli-${TAG}-windows-amd64.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wincleanerlamp-cli-*
            artifacts/gui/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
