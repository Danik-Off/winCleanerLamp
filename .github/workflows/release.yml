name: Release

on:
  # Триггер на изменения package.json в корне (поднятие версии)
  push:
    branches:
      - main
    paths:
      - 'package.json'
  # Также можно запускать вручную или по тегам
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: 'Windows: CLI + GUI + Release'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Go — установка
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Node.js — установка
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: gui/package-lock.json

      # LOCALAPPDATA не в github `env` по умолчанию — берём из PowerShell
      - name: Кэш Electron — пути
        id: electron_cache_paths
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_OUTPUT -Value "electron=$($env:LOCALAPPDATA)\electron\Cache"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "electron_builder=$($env:LOCALAPPDATA)\electron-builder\Cache"

      - name: Кэш бинарников Electron
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.electron_cache_paths.outputs.electron }}
            ${{ steps.electron_cache_paths.outputs.electron_builder }}
          key: ${{ runner.os }}-electron-${{ hashFiles('gui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: GUI — npm ci
        working-directory: gui
        run: npm ci

      - name: CLI — сборка Go
        run: go build -ldflags "-s -w" -o wincleanerlamp.exe .

      - name: GUI — сборка (tsc + Vite + Electron main)
        working-directory: gui
        run: npm run build

      - name: GUI — упаковка (electron-builder)
        working-directory: gui
        run: npm run dist:electron

      - name: Получить версию из package.json
        id: version
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=v$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"

      - name: Создать и отправить тег
        id: tag_created
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          Write-Host "Checking if tag $tag exists..."
          $exists = git tag -l $tag
          if ($exists) {
            Write-Host "Tag $tag already exists, skipping creation"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "created=false"
          } else {
            Write-Host "Creating tag $tag..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a $tag -m "Release v${{ steps.version.outputs.version }}"
            git push origin $tag
            Add-Content -Path $env:GITHUB_OUTPUT -Value "created=true"
          }

      - name: Опубликовать релиз
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            wincleanerlamp.exe
            gui/dist-release/*.exe

      - name: Сводка релиза
        if: success()
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $created = "${{ steps.tag_created.outputs.created }}"
          @"
          ## Релиз $tag
          - **CLI:** `wincleanerlamp.exe` в релизе
          - **GUI:** установщики в релизе
          - **Тег создан:** $created
          "@ | Add-Content -Path $env:GITHUB_STEP_SUMMARY -Encoding utf8
